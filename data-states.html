<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero States - Data States</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23f3f1ec'/%3E%3Ccircle cx='26' cy='26' r='10' fill='none' stroke='%23878682' stroke-width='5'/%3E%3Cpath d='M35 35l11 11' stroke='%23878682' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="data-states">
    <main class="app-shell">
      <header class="topbar">
        <nav class="tab-list" aria-label="Zero state pages"></nav>
        <button
          class="theme-toggle"
          id="theme-toggle"
          type="button"
          aria-label="Turn on dark mode"
          aria-pressed="false"
        >
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </header>

      <section class="panel">
        <div class="state" id="state">
          <div class="state-preview">
            <div class="illustration" id="illustration" aria-hidden="true"></div>
            <h1 class="state-title" id="state-title"></h1>
            <p class="state-body" id="state-body"></p>
            <button class="state-button" id="state-button" type="button"></button>
          </div>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
