<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero States</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23f3f1ec'/%3E%3Ccircle cx='26' cy='26' r='10' fill='none' stroke='%23878682' stroke-width='5'/%3E%3Cpath d='M35 35l11 11' stroke='%23878682' stroke-width='5' stroke-linecap='round'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="tab-list" role="tablist" aria-label="Zero states"></div>
        <button
          class="theme-toggle"
          id="theme-toggle"
          type="button"
          aria-label="Turn on dark mode"
          aria-pressed="false"
        >
          <span class="toggle-track">
            <span class="toggle-thumb"></span>
          </span>
        </button>
      </header>

      <section class="panel" id="panel" role="tabpanel" aria-live="polite">
        <div class="state" id="state">
          <div class="state-preview">
            <div class="illustration" id="illustration" aria-hidden="true"></div>
            <h1 class="state-title" id="state-title"></h1>
            <p class="state-body" id="state-body"></p>
            <button class="state-button" id="state-button" type="button"></button>
          </div>
          <form class="custom-controls" id="custom-controls" aria-label="Custom Lissajous controls">
            <label class="control-field">
              <span class="control-label">Amplitude X</span>
              <input id="control-amplitude-x" type="range" min="24" max="80" step="1" />
              <output class="control-value" id="value-amplitude-x" for="control-amplitude-x"></output>
            </label>
            <label class="control-field">
              <span class="control-label">Amplitude Y</span>
              <input id="control-amplitude-y" type="range" min="24" max="80" step="1" />
              <output class="control-value" id="value-amplitude-y" for="control-amplitude-y"></output>
            </label>
            <label class="control-field">
              <span class="control-label">Frequency X</span>
              <input id="control-frequency-x" type="range" min="1" max="5" step="1" />
              <output class="control-value" id="value-frequency-x" for="control-frequency-x"></output>
            </label>
            <label class="control-field">
              <span class="control-label">Frequency Y</span>
              <input id="control-frequency-y" type="range" min="1" max="5" step="1" />
              <output class="control-value" id="value-frequency-y" for="control-frequency-y"></output>
            </label>
            <label class="control-field">
              <span class="control-label">Phase</span>
              <input id="control-phase" type="range" min="0" max="6.28" step="0.01" />
              <output class="control-value" id="value-phase" for="control-phase"></output>
            </label>
            <label class="control-field">
              <span class="control-label">Rotation</span>
              <input id="control-rotation" type="range" min="-0.8" max="0.8" step="0.01" />
              <output class="control-value" id="value-rotation" for="control-rotation"></output>
            </label>
            <label class="control-field control-field-full">
              <span class="control-label">Empty state title</span>
              <input id="control-title" type="text" />
            </label>
            <label class="control-field control-field-full">
              <span class="control-label">Description</span>
              <textarea id="control-description" rows="3"></textarea>
            </label>
            <label class="control-field control-field-full">
              <span class="control-label">Button</span>
              <input id="control-button" type="text" />
            </label>
          </form>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
